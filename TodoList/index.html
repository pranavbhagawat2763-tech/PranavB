<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
    <h2>To Do List</h2>
    
    <div class="input-card">
        <input type="text" placeholder="Enter The Task Here...">
        <button id="btn">Add</button>
    </div>

    <div class="task-card">
        <div class="task">
            <span>Complete Your Home Work...</span>
            <div class="actions">
                <div class="edit">✎</div>
                <div class="delete">🗑</div>
            </div>
        </div>

        <div class="task">
            <span>Start Solving Leetcode Problems...</span>
            <div class="actions">
                <div class="edit">✎</div>
                <div class="delete">🗑</div>
            </div>
        </div>

        <div class="task">
            <span>Make New Projects...</span>
            <div class="actions">
                <div class="edit">✎</div>
                <div class="delete">🗑</div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
